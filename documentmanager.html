<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Document Uploads - AXIOMBYTE SMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="assets/app.css?v=20260717-sky-navy-theme1" />
<link rel="stylesheet" href="assets/fit-wrap.css?v=20260717-sky-navy-theme1" />
<link rel="stylesheet" href="assets/theme.css?v=20260717-sky-navy-theme2" />
<style>
  .document-layout { display:grid; grid-template-columns:minmax(320px, .9fr) minmax(0, 2fr); gap:18px; align-items:start; }
  .owner-search-row { display:grid; grid-template-columns:minmax(0, 1fr) auto; gap:8px; }
  .owner-search-row .btn { min-width:104px; }
  .owner-search-status { min-height:18px; margin:5px 0 0; color:#002B4C; font-size:12px; font-weight:700; }
  .owner-search-status.is-empty { color:#b42318; }
  #ownerId:disabled { cursor:not-allowed; opacity:.72; }
  @media (max-width: 980px) { .document-layout { grid-template-columns:1fr; } }
  @media (max-width: 520px) {
    .owner-search-row { grid-template-columns:1fr; }
    .owner-search-row .btn { width:100%; }
  }
</style>
</head>
<body class="portal-shell footer-shell">
<div class="main">
  <main class="content">
    <div class="document-layout">
      <div class="card">
        <div class="card__head"><i class="fas fa-upload"></i> Upload Document</div>
        <div class="card__body">
          <form id="docForm" class="grid" style="gap:14px" novalidate>
            <div class="field"><label>Owner type <span class="req">*</span></label>
              <select class="select" id="ownerType" required>
                <option value="">Select owner type...</option>
                <option value="student">Student</option>
                <option value="staff">Staff</option>
              </select></div>
            <div class="field" id="studentClassField" hidden><label>Student class</label>
              <select class="select" id="ownerClass"><option value="">All Classes</option></select></div>
            <div class="field"><label id="ownerSearchLabel">Search owner</label>
              <div class="owner-search-row">
                <input class="input" id="ownerSearch" placeholder="Select owner type first..." disabled>
                <button class="btn btn--primary" type="button" id="searchOwner" disabled><i class="fas fa-magnifying-glass"></i> Search</button>
              </div>
              <p class="owner-search-status" id="ownerSearchStatus" aria-live="polite"></p>
            </div>
            <div class="field"><label>Search results / owner <span class="req">*</span></label>
              <select class="select" id="ownerId" required disabled><option value="">Search for an owner first...</option></select></div>
            <div class="field"><label>Document title <span class="req">*</span></label><input class="input" id="docTitle" required placeholder="e.g. Birth Certificate"></div>
            <div class="field"><label>Document file <span class="req">*</span></label><input class="input" id="docFile" type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" required></div>
            <button type="submit" class="btn btn--primary" id="uploadDocumentButton"><i class="fas fa-floppy-disk"></i> Upload Document</button>
          </form>
        </div>
      </div>

      <div class="card card--pad-0">
        <div class="card__head"><i class="fas fa-table-list"></i> Uploaded Documents</div>
        <div class="toolbar" style="padding:14px 16px 0; margin:0">
          <select class="select" id="filterType" style="max-width:180px"><option value="">All Owners</option><option value="student">Students</option><option value="staff">Staff</option></select>
          <div class="search grow"><i class="fas fa-magnifying-glass"></i><input id="search" placeholder="Search documents..."></div>
        </div>
        <div class="table-wrap">
          <table class="tbl" id="docTable">
            <thead><tr><th>Title</th><th>Owner</th><th>Owner Type</th><th>File</th><th>Type</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="empty" id="docEmpty"><i class="fas fa-file-lines"></i>No documents uploaded yet.</div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js?v=20260719-document-view"></script>
<script src="assets/shell.js?v=20260719-privilege-access1"></script>
<script>
Portal.init({ active: 'documentmanager' });

var students = [];
var staff = [];
var ownerClasses = [];
var STORAGE_KEY = 'axiom_documents';
var documents = loadDocuments();

async function loadOwnersFromSupabase() {
  if (!window.AxiomDB || !AxiomDB.isConfigured()) return;
  try {
    var directory = AxiomDB.listDocumentOwners ? await AxiomDB.listDocumentOwners() : null;
    var dbStudents;
    var dbStaff;
    if (directory) {
      dbStudents = directory.students || [];
      dbStaff = directory.staff || [];
      ownerClasses = (directory.classes || []).map(function(row) {
        return { id: row.id, name: row.name || 'Unnamed Class' };
      });
    } else {
      dbStudents = await AxiomDB.listStudents();
      dbStaff = await AxiomDB.listStaff();
    }
    if (dbStudents && dbStudents.length) {
      students = dbStudents.map(function(row) {
        return {
          id: row.id,
          code: row.student_id || row.ass_ref_id || '',
          name: row.name || [row.first_name, row.surname, row.other_names].filter(Boolean).join(' '),
          classId: row.class_id || '',
          className: row.class_name || (row.classes && row.classes.name) || 'Unassigned Class'
        };
      });
    }
    if (dbStaff && dbStaff.length) {
      staff = dbStaff.map(function(row) {
        return { id: row.id, code: row.staff_id || '', name: row.name || row.full_name || row.staff_name || '' };
      });
    }
    if (!ownerClasses.length) {
      var classMap = {};
      students.forEach(function(student) {
        if (student.classId && !classMap[student.classId]) classMap[student.classId] = { id: student.classId, name: student.className };
      });
      ownerClasses = Object.keys(classMap).map(function(key) { return classMap[key]; });
    }
    populateOwnerClasses();
    resetOwnerResults('Owner directory loaded. Enter a name or ID, then click Search.');
  } catch (err) {
    console.error(err);
    Portal.toast('Could not load owners from Supabase: ' + (err.message || 'Unknown error'), true);
  }
}

function loadDocuments() {
  try {
    var saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : [];
  } catch (e) {
    return [];
  }
}

function saveDocuments() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(documents)); } catch (e) {}
}

function fileType(fileName) {
  var parts = fileName.split('.');
  return parts.length > 1 ? parts.pop().toUpperCase() : 'FILE';
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function ownerById(type, id) {
  return ownerList(type).find(function(owner) { return owner.id === id; });
}

async function loadDocumentsFromSupabase() {
  if (!window.AxiomDB || !AxiomDB.isConfigured() || !AxiomDB.listDocuments) return;
  try {
    var rows = await AxiomDB.listDocuments();
    documents = (rows || []).map(function(row) {
      var type = row.owner_type;
      var ownerId = type === 'student' ? row.student_id : row.staff_user_id;
      var owner = ownerById(type, ownerId);
      return {
        id: row.id,
        ownerType: type,
        ownerId: ownerId,
        ownerName: owner ? owner.name : 'Unknown owner',
        title: row.title || 'Untitled Document',
        fileName: row.file_name || 'Document',
        fileType: row.file_type || fileType(row.file_name || ''),
        fileSize: row.file_size || 0,
        fileUrl: row.file_url || ''
      };
    });
    saveDocuments();
    renderDocuments();
  } catch (err) {
    console.error(err);
    Portal.toast('Could not load uploaded documents: ' + (err.message || 'Unknown error'), true);
  }
}

function ownerList(type) {
  return type === 'student' ? students : type === 'staff' ? staff : [];
}

function ownerTypeLabel(type) {
  return type === 'student' ? 'Student' : 'Staff';
}

function populateOwnerClasses() {
  var classSelect = document.getElementById('ownerClass');
  classSelect.innerHTML = '<option value="">All Classes</option>';
  ownerClasses.slice().sort(function(a, b) { return a.name.localeCompare(b.name); }).forEach(function(item) {
    var option = document.createElement('option');
    option.value = item.id;
    option.textContent = item.name;
    classSelect.appendChild(option);
  });
}

function resetOwnerResults(message) {
  var ownerSelect = document.getElementById('ownerId');
  ownerSelect.innerHTML = '<option value="">Search for an owner first...</option>';
  ownerSelect.disabled = true;
  var status = document.getElementById('ownerSearchStatus');
  status.classList.remove('is-empty');
  status.textContent = message || '';
}

function updateOwnerSearchMode() {
  var type = document.getElementById('ownerType').value;
  var searchInput = document.getElementById('ownerSearch');
  var searchButton = document.getElementById('searchOwner');
  document.getElementById('studentClassField').hidden = type !== 'student';
  document.getElementById('ownerSearchLabel').textContent = type === 'student' ? 'Search student by name or Student ID' : type === 'staff' ? 'Search staff by name or Staff ID' : 'Search owner';
  searchInput.disabled = !type;
  searchButton.disabled = !type;
  searchInput.placeholder = type === 'student' ? 'Enter student name or Student ID...' : type === 'staff' ? 'Enter staff name or Staff ID...' : 'Select owner type first...';
  searchInput.value = '';
  document.getElementById('ownerClass').value = '';
  resetOwnerResults(type ? 'Enter a name or ID, then click Search.' : 'Select an owner type first.');
}

function searchOwners() {
  var type = document.getElementById('ownerType').value;
  if (!type) {
    Portal.toast('Select Student or Staff first.', true);
    return;
  }
  var query = document.getElementById('ownerSearch').value.trim().toLowerCase();
  var classId = type === 'student' ? document.getElementById('ownerClass').value : '';
  var owners = ownerList(type).filter(function(owner) {
    var matchesClass = !classId || owner.classId === classId;
    var searchable = (owner.name + ' ' + (owner.code || '')).toLowerCase();
    return matchesClass && (!query || searchable.indexOf(query) > -1);
  }).sort(function(a, b) { return a.name.localeCompare(b.name); });
  var ownerSelect = document.getElementById('ownerId');
  ownerSelect.innerHTML = '<option value="">'+(owners.length ? 'Select from '+owners.length+' result'+(owners.length === 1 ? '' : 's')+'...' : 'No matching owner found')+'</option>';
  owners.forEach(function(owner) {
    var option = document.createElement('option');
    option.value = owner.id;
    option.textContent = owner.name + (owner.code ? ' - ' + owner.code : '') + (type === 'student' && owner.className ? ' - ' + owner.className : '');
    option.dataset.name = owner.name;
    ownerSelect.appendChild(option);
  });
  ownerSelect.disabled = !owners.length;
  var status = document.getElementById('ownerSearchStatus');
  status.classList.toggle('is-empty', !owners.length);
  status.textContent = owners.length ? owners.length + ' matching ' + ownerTypeLabel(type).toLowerCase() + (owners.length === 1 ? '' : 's') + ' found.' : 'No matching ' + ownerTypeLabel(type).toLowerCase() + ' found.';
}

function renderDocuments() {
  var filterType = document.getElementById('filterType').value;
  var query = document.getElementById('search').value.toLowerCase();
  var filtered = documents.filter(function(doc) {
    var matchesType = !filterType || doc.ownerType === filterType;
    var matchesQuery = !query || (doc.title + ' ' + doc.ownerName + ' ' + doc.fileName).toLowerCase().indexOf(query) > -1;
    return matchesType && matchesQuery;
  });
  document.querySelector('#docTable tbody').innerHTML = filtered.map(function(doc) {
    return '<tr><td style="font-weight:600">'+escapeHtml(doc.title)+'</td><td>'+escapeHtml(doc.ownerName)+'</td><td>'+ownerTypeLabel(doc.ownerType)+'</td><td>'+escapeHtml(doc.fileName)+'</td><td><span class="badge badge--gray">'+escapeHtml(doc.fileType)+'</span></td>'+
      '<td><div class="row-actions"><button class="btn btn--primary" type="button" data-action="view" data-id="'+escapeHtml(doc.id)+'" title="View document"><i class="fas fa-eye"></i> View</button><button class="btn btn--danger" type="button" data-action="delete" data-id="'+escapeHtml(doc.id)+'" title="Delete"><i class="fas fa-trash"></i></button></div></td></tr>';
  }).join('');
  document.getElementById('docEmpty').style.display = filtered.length ? 'none' : 'block';
}

document.getElementById('ownerType').addEventListener('change', updateOwnerSearchMode);
document.getElementById('ownerClass').addEventListener('change', function() {
  if (document.getElementById('ownerType').value === 'student') searchOwners();
});
document.getElementById('searchOwner').addEventListener('click', searchOwners);
document.getElementById('ownerSearch').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    searchOwners();
  }
});
document.getElementById('filterType').addEventListener('change', renderDocuments);
document.getElementById('search').addEventListener('input', renderDocuments);

document.getElementById('docForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  async function save() {
    var ownerSelect = document.getElementById('ownerId');
    var ownerType = document.getElementById('ownerType').value;
    var file = document.getElementById('docFile').files[0];
    var title = document.getElementById('docTitle').value.trim();
    var uploadButton = document.getElementById('uploadDocumentButton');

    if (!ownerType) throw new Error('Select Student or Staff.');
    if (!ownerSelect.value) throw new Error('Search for and select the student or staff member.');
    if (!title) throw new Error('Enter a document title.');
    if (!file) throw new Error('Choose a document file.');

    var selectedOwner = ownerSelect.options[ownerSelect.selectedIndex];
    uploadButton.disabled = true;
    uploadButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

    try {
      if (window.AxiomDB && AxiomDB.isConfigured()) {
        var saved = await AxiomDB.uploadOwnerDocument(ownerType, ownerSelect.value, title, file);
        documents.push({
          id: saved.id,
          ownerType: ownerType,
          ownerId: ownerSelect.value,
          ownerName: selectedOwner.dataset.name,
          title: saved.title,
          fileName: saved.file_name,
          fileType: saved.file_type,
          fileSize: saved.file_size,
          fileUrl: saved.file_url || ''
        });
      } else {
        documents.push({
          id: 'DOC-' + Date.now(),
          ownerType: ownerType,
          ownerId: ownerSelect.value,
          ownerName: selectedOwner.dataset.name,
          title: title,
          fileName: file.name,
          fileType: fileType(file.name),
          fileSize: file.size,
          fileUrl: URL.createObjectURL(file)
        });
        saveDocuments();
      }
      form.reset();
      updateOwnerSearchMode();
      renderDocuments();
      Portal.toast('Document uploaded successfully.');
    } finally {
      uploadButton.disabled = false;
      uploadButton.innerHTML = '<i class="fas fa-floppy-disk"></i> Upload Document';
    }
  }
  save().catch(function(err) {
    console.error(err);
    Portal.toast('Could not upload document: ' + (err.message || 'Unknown error'), true);
  });
});

document.getElementById('docTable').addEventListener('click', function(e) {
  var b = e.target.closest('button[data-id]');
  if (!b) return;
  var doc = documents.find(function(item) { return item.id === b.dataset.id; });
  if (b.dataset.action === 'view') {
    var previewWindow = window.open('about:blank', '_blank');
    if (!previewWindow) {
      Portal.toast('Allow pop-ups for this site to view the document.', true);
      return;
    }
    previewWindow.opener = null;
    async function viewDoc() {
      if (!doc) throw new Error('Document record was not found.');
      var url = doc.fileUrl;
      if (window.AxiomDB && AxiomDB.isConfigured() && AxiomDB.documentViewUrl) {
        url = await AxiomDB.documentViewUrl(doc.ownerType, doc.fileUrl);
      }
      if (!url) throw new Error('This document is not available for viewing.');
      previewWindow.location.replace(url);
    }
    viewDoc().catch(function(err) {
      previewWindow.close();
      console.error(err);
      Portal.toast('Could not open document: ' + (err.message || 'Unknown error'), true);
    });
    return;
  }
  if (b.dataset.action !== 'delete') return;
  async function deleteDoc() {
    if (window.AxiomDB && AxiomDB.isConfigured() && AxiomDB.deleteDocument) {
      await AxiomDB.deleteDocument(b.dataset.id);
    }
    documents = documents.filter(function(doc) { return doc.id !== b.dataset.id; });
    saveDocuments();
    renderDocuments();
    Portal.toast('Document deleted.');
  }
  if (!confirm('Delete this document?')) return;
  deleteDoc().catch(function(err) {
    console.error(err);
    Portal.toast('Could not delete document: ' + (err.message || 'Unknown error'), true);
  });
});

populateOwnerClasses();
updateOwnerSearchMode();
renderDocuments();
loadOwnersFromSupabase().then(loadDocumentsFromSupabase);
</script>
<footer class="axiom-standard-footer" style="padding:16px 18px;text-align:center;color:#64748b;font-weight:800;font-size:13px;border-top:1px solid rgba(226,232,240,.9);background:#fff;line-height:1.6;">
  <span>&copy; 2026 AXIOMBYTE SMS. All rights reserved.</span><span style="display:inline-block;margin-left:56px;">Built for secure school operations.</span>
</footer>
</body>
</html>
