<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>School Monitor — AXIOMBYTE SMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="assets/app.css?v=20260714-staff-assignments1" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>.chart-wrap{ position:relative; height:260px; }</style>
</head>
<body class="portal-shell footer-shell">
<div class="main">
  <main class="content">
    <div class="page-head">
      <span class="ph-ico"><i class="fas fa-chart-line"></i></span>
      <div><h2>School Monitor</h2><p>Track assessment-capture progress across classes and subjects.</p></div>
    </div>

    <div class="grid cols-4">
      <div class="card stat"><i class="fas fa-users" style="color:var(--brand)"></i><div class="num">1,284</div><div class="cap">Students</div></div>
      <div class="card stat"><i class="fas fa-clipboard-check" style="color:var(--green)"></i><div class="num">82%</div><div class="cap">Scores Captured</div></div>
      <div class="card stat"><i class="fas fa-hourglass-half" style="color:var(--amber)"></i><div class="num">18%</div><div class="cap">Outstanding</div></div>
      <div class="card stat"><i class="fas fa-book" style="color:var(--purple)"></i><div class="num">30</div><div class="cap">Subjects</div></div>
    </div>

    <div class="grid" style="grid-template-columns:1fr 1fr; margin-top:18px; align-items:start">
      <div class="card card--pad-0">
        <div class="card__head"><i class="fas fa-list-check"></i> Capture Progress by Subject</div>
        <div class="card__body" id="progress"></div>
      </div>
      <div class="card">
        <div class="card__head" style="border:0;padding:0 0 10px"><i class="fas fa-chart-column"></i> Completion by Class</div>
        <div class="chart-wrap"><canvas id="classChart"></canvas></div>
      </div>
    </div>
  </main>
</div>

<script src="assets/shell.js?v=20260714-staff-assignments1"></script>
<script>
Portal.init({ active: 'assessmentmonitor' });

var subjects = [
  ['Core Mathematics',98],['English Language',95],['Integrated Science',88],
  ['Social Studies',79],['Elective Mathematics',72],['Physics',64],
  ['Chemistry',58],['Biology',83],['Economics',45],['Information Technology',91]
];
document.getElementById('progress').innerHTML = subjects.map(function(s){
  var cls = s[1]>=85?'green':s[1]>=60?'amber':'red';
  return '<div style="padding:9px 0;border-bottom:1px solid var(--border)">'+
    '<div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px">'+
      '<span>'+s[0]+'</span><span class="badge badge--'+cls+'">'+s[1]+'%</span></div>'+
    '<div class="progress"><span style="width:0" data-w="'+s[1]+'%"></span></div></div>';
}).join('');
// animate bars
setTimeout(function(){ document.querySelectorAll('.progress > span').forEach(function(b){ b.style.width = b.dataset.w; }); }, 100);

var fontColor = getComputedStyle(document.body).color;
new Chart(document.getElementById('classChart'), {
  type:'bar',
  data:{ labels:['Year 1 A','Year 1 B','Year 2 A','Year 2 B','Year 3 A','Year 3 B'],
    datasets:[{ label:'% captured', data:[91,86,84,77,69,72], backgroundColor:'#0b6bcb', borderRadius:8, maxBarThickness:46 }] },
  options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
    scales:{ x:{grid:{display:false},ticks:{color:fontColor}}, y:{beginAtZero:true,max:100,ticks:{color:fontColor,callback:function(v){return v+'%';}},grid:{color:'rgba(125,125,125,.12)'}} } }
});
</script>
<footer class="axiom-standard-footer" style="padding:16px 18px;text-align:center;color:#64748b;font-weight:800;font-size:13px;border-top:1px solid rgba(226,232,240,.9);background:#fff;line-height:1.6;">
  <span>&copy; 2026 AXIOMBYTE SMS. All rights reserved.</span><span style="display:inline-block;margin-left:56px;">Built for secure school operations.</span>
</footer>
</body>
</html>
