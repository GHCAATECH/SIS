<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manage Subjects - AXIOMBYTE SMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="assets/app.css?v=20260717-sky-navy-theme1" />
<link rel="stylesheet" href="assets/fit-wrap.css?v=20260717-sky-navy-theme1" />
<link rel="stylesheet" href="assets/theme.css?v=20260719-icons-sky" />
<style>
  .subject-pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 14px;
    border-top: 1px solid #002B4C;
    background: #fff;
  }
  .subject-page-info { color: #002B4C; font-size: 13px; font-weight: 700; white-space: nowrap; }
  .subject-page-buttons { display: flex; align-items: center; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }
  .subject-page-button {
    min-width: 34px;
    min-height: 32px;
    padding: 5px 9px;
    border: 1px solid #002B4C;
    border-radius: 7px;
    background: #fff;
    color: #002B4C;
    font: inherit;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
  }
  .subject-page-button:hover:not(:disabled),
  .subject-page-button.active { background: #002B4C; color: #C0EBFF; }
  .subject-page-button:disabled { cursor: not-allowed; opacity: .45; }
  @media (max-width: 640px) {
    .subject-pagination { align-items: flex-start; flex-direction: column; }
    .subject-page-buttons { justify-content: flex-start; }
  }
</style>
</head>
<body class="portal-shell footer-shell">
<div class="main">
  <main class="content">
    <div class="page-head">
      <span class="ph-ico"><i class="fas fa-book"></i></span>
      <div><h2>Add / Manage Subjects</h2><p>Create subjects and link each one to a programme.</p></div>
    </div>

    <div class="grid" style="grid-template-columns:1fr 2fr; align-items:start">
      <div class="card">
        <div class="card__head"><i class="fas fa-plus"></i> <span id="subjectFormTitle">Add Subject</span></div>
        <div class="card__body">
          <form id="subjectForm" class="grid" style="gap:14px">
            <div class="field"><label>Programme <span class="req">*</span></label>
              <select class="select" id="sProgramme" required><option value="">Loading programmes...</option></select></div>
            <div class="field"><label>Subject name <span class="req">*</span></label><input class="input" id="sName" required placeholder="e.g. Physics"></div>
            <div class="field"><label>Subject code</label><input class="input" id="sCode" placeholder="e.g. PHY"></div>
            <div class="field"><label>Subject type <span class="req">*</span></label>
              <select class="select" id="sType" required>
                <option>Elective</option>
                <option>Core</option>
              </select></div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
              <button type="button" class="btn" id="cancelSubjectEdit" hidden>Cancel</button>
              <button type="submit" class="btn btn--primary" id="saveSubjectButton"><i class="fas fa-floppy-disk"></i> Add Subject</button>
            </div>
          </form>
        </div>
      </div>

      <div class="card card--pad-0">
        <div class="card__head"><i class="fas fa-table-list"></i> Existing Subjects</div>
        <div class="table-wrap">
          <table class="tbl" id="subjectTbl">
            <thead><tr><th>Subject</th><th>Code</th><th>Type</th><th>Programme</th><th>Actions</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <div class="subject-pagination" id="subjectPagination" aria-label="Subject table pagination"></div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js?v=20260719-subject-edit-pagination"></script>
<script src="assets/shell.js?v=20260719-privilege-access1"></script>
<script>
Portal.init({ active: 'subjectmanager' });

var PROGRAMME_KEY = 'axiom_programmes';
var SUBJECT_KEY = 'axiom_subjects';
var defaultProgrammes = [
  { name: 'General Science' },
  { name: 'General Arts' },
  { name: 'Business' },
  { name: 'Visual Arts' },
  { name: 'Home Economics' },
  { name: 'Agricultural Science' }
];
var defaultSubjects = [
  { name: 'Core Mathematics', code: 'MATH', type: 'Core', programme: 'All Programmes' },
  { name: 'English Language', code: 'ENG', type: 'Core', programme: 'All Programmes' },
  { name: 'Integrated Science', code: 'SCI', type: 'Core', programme: 'All Programmes' },
  { name: 'Social Studies', code: 'SOC', type: 'Core', programme: 'All Programmes' },
  { name: 'Elective Mathematics', code: 'EMATH', type: 'Elective', programme: 'General Science' },
  { name: 'Physics', code: 'PHY', type: 'Elective', programme: 'General Science' },
  { name: 'Chemistry', code: 'CHEM', type: 'Elective', programme: 'General Science' },
  { name: 'Biology', code: 'BIO', type: 'Elective', programme: 'General Science' },
  { name: 'Economics', code: 'ECON', type: 'Elective', programme: 'General Arts' },
  { name: 'Geography', code: 'GEO', type: 'Elective', programme: 'General Arts' },
  { name: 'Government', code: 'GOV', type: 'Elective', programme: 'General Arts' },
  { name: 'History', code: 'HIST', type: 'Elective', programme: 'General Arts' },
  { name: 'Financial Accounting', code: 'FA', type: 'Elective', programme: 'Business' },
  { name: 'Cost Accounting', code: 'CA', type: 'Elective', programme: 'Business' },
  { name: 'Business Management', code: 'BM', type: 'Elective', programme: 'Business' }
];

function loadList(key, fallback) {
  try {
    var saved = localStorage.getItem(key);
    return saved ? JSON.parse(saved) : fallback.slice();
  } catch (e) {
    return fallback.slice();
  }
}

function saveSubjects() {
  try { localStorage.setItem(SUBJECT_KEY, JSON.stringify(subjects)); } catch (e) {}
}

function saveProgrammes() {
  try { localStorage.setItem(PROGRAMME_KEY, JSON.stringify(programmes)); } catch (e) {}
}

function programmeName(programme) {
  return typeof programme === 'string' ? programme : programme.name;
}

var programmes = loadList(PROGRAMME_KEY, defaultProgrammes);
var subjects = loadList(SUBJECT_KEY, defaultSubjects);
var editingSubjectIndex = -1;
var currentSubjectPage = 1;
var subjectsPerPage = 10;

function mapDbSubject(subject) {
  return {
    id: subject.id,
    name: subject.name,
    code: subject.code || '',
    type: subject.subject_type || subject.type || 'Elective',
    programme: subject.applies_to_all_programmes ? 'All Programmes' : ((subject.programmes && subject.programmes.name) || subject.programme || '')
  };
}

function populateProgrammes() {
  var select = document.getElementById('sProgramme');
  select.innerHTML = '<option value="">Select programme...</option><option>All Programmes</option>';
  programmes.forEach(function(programme) {
    var name = programmeName(programme);
    if (!name) return;
    var option = document.createElement('option');
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
}

function render() {
  var totalPages = Math.max(1, Math.ceil(subjects.length / subjectsPerPage));
  currentSubjectPage = Math.min(Math.max(currentSubjectPage, 1), totalPages);
  var startIndex = (currentSubjectPage - 1) * subjectsPerPage;
  var pageSubjects = subjects.slice(startIndex, startIndex + subjectsPerPage);
  document.querySelector('#subjectTbl tbody').innerHTML = pageSubjects.length ? pageSubjects.map(function(s, pageIndex) {
    var idx = startIndex + pageIndex;
    return '<tr><td style="font-weight:600">'+s.name+'</td><td>'+(s.code || '-')+'</td><td>'+s.type+'</td><td>'+s.programme+'</td>'+
      '<td><div class="row-actions">'+
        '<button class="btn" data-act="Edit" data-i="'+idx+'" title="Edit subject"><i class="fas fa-pen"></i> Edit</button>'+
        '<button class="btn btn--danger" data-act="Drop" data-i="'+idx+'" title="Drop"><i class="fas fa-trash"></i></button>'+
      '</div></td></tr>';
  }).join('') : '<tr><td colspan="5" style="padding:28px;text-align:center;font-weight:700">No subjects found.</td></tr>';
  renderSubjectPagination(totalPages, startIndex, pageSubjects.length);
}

function renderSubjectPagination(totalPages, startIndex, visibleCount) {
  var pagination = document.getElementById('subjectPagination');
  var first = subjects.length ? startIndex + 1 : 0;
  var last = subjects.length ? startIndex + visibleCount : 0;
  var buttons = '<button type="button" class="subject-page-button" data-page="'+(currentSubjectPage - 1)+'" '+(currentSubjectPage === 1 ? 'disabled' : '')+'>Previous</button>';
  for (var page = 1; page <= totalPages; page += 1) {
    buttons += '<button type="button" class="subject-page-button'+(page === currentSubjectPage ? ' active' : '')+'" data-page="'+page+'" aria-label="Page '+page+'" '+(page === currentSubjectPage ? 'aria-current="page"' : '')+'>'+page+'</button>';
  }
  buttons += '<button type="button" class="subject-page-button" data-page="'+(currentSubjectPage + 1)+'" '+(currentSubjectPage === totalPages ? 'disabled' : '')+'>Next</button>';
  pagination.innerHTML = '<span class="subject-page-info">Showing '+first+' to '+last+' of '+subjects.length+' subjects</span><div class="subject-page-buttons">'+buttons+'</div>';
}

populateProgrammes();
render();

async function refreshSubjectsFromSupabase() {
  if (!window.AxiomDB || !AxiomDB.isConfigured()) return;
  try {
    var dbProgrammes = await AxiomDB.listProgrammes();
    var dbSubjects = await AxiomDB.listSubjects();
    if (dbProgrammes && dbProgrammes.length) {
      programmes = dbProgrammes.map(function(p) {
        return { id: p.id, name: p.name, code: p.code || '', department: p.department || '' };
      });
      saveProgrammes();
    }
    if (dbSubjects && dbSubjects.length) {
      subjects = dbSubjects.map(mapDbSubject);
      saveSubjects();
    }
    populateProgrammes();
    currentSubjectPage = 1;
    render();
  } catch (err) {
    console.error(err);
    Portal.toast('Could not load subjects from Supabase: ' + (err.message || 'Unknown error'), true);
  }
}
refreshSubjectsFromSupabase();

document.getElementById('subjectForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var form = this;
  async function saveSubject() {
    var subject = {
      programme: document.getElementById('sProgramme').value,
      name: document.getElementById('sName').value.trim(),
      code: document.getElementById('sCode').value.trim(),
      type: document.getElementById('sType').value
    };
    var exists = subjects.some(function(s, index) {
      return index !== editingSubjectIndex && s.name.toLowerCase() === subject.name.toLowerCase() && s.programme === subject.programme;
    });
    if (exists) {
      Portal.toast('Subject already exists for this programme.', true);
      return;
    }
    var isEditing = editingSubjectIndex > -1;
    var previous = isEditing ? subjects[editingSubjectIndex] : null;
    if (window.AxiomDB && AxiomDB.isConfigured()) {
      if (isEditing && previous.id && AxiomDB.updateSubject) subject = mapDbSubject(await AxiomDB.updateSubject(previous.id, subject));
      else if (!isEditing && AxiomDB.createSubject) subject = mapDbSubject(await AxiomDB.createSubject(subject));
    }
    if (isEditing) subjects[editingSubjectIndex] = Object.assign({}, previous, subject);
    else {
      subjects.push(subject);
      currentSubjectPage = Math.max(1, Math.ceil(subjects.length / subjectsPerPage));
    }
    saveSubjects();
    render();
    resetSubjectForm();
    Portal.toast(isEditing ? 'Subject updated.' : 'Subject added.');
  }
  saveSubject().catch(function(err) {
    console.error(err);
    Portal.toast('Could not save subject: ' + (err.message || 'Unknown error'), true);
  });
});

function resetSubjectForm() {
  editingSubjectIndex = -1;
  document.getElementById('subjectForm').reset();
  populateProgrammes();
  document.getElementById('subjectFormTitle').textContent = 'Add Subject';
  document.getElementById('saveSubjectButton').innerHTML = '<i class="fas fa-floppy-disk"></i> Add Subject';
  document.getElementById('cancelSubjectEdit').hidden = true;
}

document.getElementById('cancelSubjectEdit').addEventListener('click', resetSubjectForm);

document.getElementById('subjectPagination').addEventListener('click', function(e) {
  var button = e.target.closest('button[data-page]');
  if (!button || button.disabled) return;
  currentSubjectPage = Number(button.dataset.page) || 1;
  render();
});

document.getElementById('subjectTbl').addEventListener('click', function(e) {
  var b = e.target.closest('button[data-act]');
  if (!b) return;
  var i = +b.dataset.i;
  if (b.dataset.act === 'Edit') {
    editingSubjectIndex = i;
    var selected = subjects[i];
    document.getElementById('sProgramme').value = selected.programme || '';
    document.getElementById('sName').value = selected.name || '';
    document.getElementById('sCode').value = selected.code || '';
    document.getElementById('sType').value = selected.type || 'Elective';
    document.getElementById('subjectFormTitle').textContent = 'Edit Subject';
    document.getElementById('saveSubjectButton').innerHTML = '<i class="fas fa-floppy-disk"></i> Save Changes';
    document.getElementById('cancelSubjectEdit').hidden = false;
    document.getElementById('sName').focus();
    return;
  }
  if (!confirm('Drop '+subjects[i].name+'?')) return;
  async function dropSubject() {
    if (window.AxiomDB && AxiomDB.isConfigured() && AxiomDB.deleteSubject && subjects[i].id) {
      await AxiomDB.deleteSubject(subjects[i].id);
    }
    subjects.splice(i, 1);
    saveSubjects();
    render();
    Portal.toast('Subject dropped.');
  }
  dropSubject().catch(function(err) {
    console.error(err);
    Portal.toast('Could not drop subject: remove it from linked classes first. ' + (err.message || ''), true);
  });
});
</script>

</body>
</html>
