function loadList(key, fallback) {
  try {
    var saved = localStorage.getItem(key);
    return saved ? JSON.parse(saved) : fallback.slice();
  } catch (e) {
    return fallback.slice();
  }
}

function itemName(item) {
  return typeof item === 'string' ? item : item.name;
}

function levelFromAdmissionYear(admissionYear) {
  if (admissionYear === null || admissionYear === undefined || admissionYear === '') return '';
  var difference = new Date().getFullYear() - Number(admissionYear);
  if (!Number.isFinite(difference)) return '';
  if (difference <= 0) return 'Year 1';
  if (difference === 1) return 'Year 2';
  if (difference === 2) return 'Year 3';
  return 'Completed';
}

function nextStudentLevel(level) {
  if (level === 'Year 1') return 'Year 2';
  if (level === 'Year 2') return 'Year 3';
  if (level === 'Year 3') return 'Completed';
  return 'Completed';
}

function loadStudentLevels() {
  try {
    var saved = JSON.parse(localStorage.getItem(STUDENT_LEVELS_KEY) || '{}');
    return saved && typeof saved === 'object' ? saved : {};
  } catch (e) {
    return {};
  }
}

function currentStudentLevel(row) {
  var overrides = loadStudentLevels();
  var detail = studentDetails[row[0]] || {};
  if (overrides[row[0]]) return overrides[row[0]];
  if (detail.studentLevel) return detail.studentLevel;
  var classRecord = academicClasses.find(function(cls) { return cls.name === row[5]; });
  if (classRecord && classRecord.year_level) return classRecord.year_level;
  return levelFromAdmissionYear(detail.yearAdmitted) || 'Year 1';
}

function saveLocalProgression(transitions) {
  var levels = loadStudentLevels();
  transitions.forEach(function(item) { levels[item.assRef] = item.toLevel; });
  localStorage.setItem(STUDENT_LEVELS_KEY, JSON.stringify(levels));
  saveArchiveTransitions(transitions);

  var registered = [];
  try { registered = JSON.parse(localStorage.getItem('axiom_registered_students') || '[]'); } catch (e) {}
  if (Array.isArray(registered) && registered.length) {
    registered.forEach(function(student) {
      var assRef = student.ass_ref_id || student.assRef || student.ass_ref;
      var transition = transitions.find(function(item) { return item.assRef === assRef; });
      if (!transition) return;
      student.student_level = transition.toLevel;
      if (transition.toLevel === 'Completed') student.status = 'Completed';
    });
    localStorage.setItem('axiom_registered_students', JSON.stringify(registered));
  }

  transitions.forEach(function(item) {
    var row = findStudent(item.assRef);
    if (row && item.toLevel === 'Completed') row[8] = 'Completed';
    if (studentDetails[item.assRef]) studentDetails[item.assRef].studentLevel = item.toLevel;
  });
}

function saveArchiveTransitions(transitions) {
  var completed = transitions.filter(function(item) { return item.toLevel === 'Completed'; });
  if (!completed.length) return;
  var archive = [];
  try { archive = JSON.parse(localStorage.getItem(STUDENT_ARCHIVE_KEY) || '[]'); } catch (e) {}
  if (!Array.isArray(archive)) archive = [];
  var existing = {};
  archive.forEach(function(item) { if (item && item.assRef) existing[item.assRef] = true; });
  var completedOn = new Date().toISOString();
  var completionYear = String(new Date().getFullYear());
  completed.forEach(function(item) {
    if (existing[item.assRef]) return;
    var row = findStudent(item.assRef) || [];
    var detail = studentDetails[item.assRef] || {};
    archive.push({
      assRef: item.assRef,
      name: row[1] || studentFullName(detail),
      gender: row[3] || '',
      className: row[5] || item.className || '',
      programme: detail.learningArea || '',
      guardianPhone: detail.phone || '',
      completedOn: completedOn,
      completionYear: completionYear,
      fromLevel: item.fromLevel,
      status: 'Completed'
    });
  });
  localStorage.setItem(STUDENT_ARCHIVE_KEY, JSON.stringify(archive));
}

function mapDbSubject(subject) {
  return {
    id: subject.id,
    name: subject.name,
    code: subject.code || '',
    type: subject.subject_type || subject.type || 'Elective',
    programme: subject.applies_to_all_programmes ? 'All Programmes' : ((subject.programmes && subject.programmes.name) || subject.programme || '')
  };
}

function saveAcademicCache() {
  try { localStorage.setItem(PROGRAMME_KEY, JSON.stringify(academicProgrammes)); } catch (e) {}
  try { localStorage.setItem(SUBJECT_KEY, JSON.stringify(academicSubjects)); } catch (e) {}
  try { localStorage.setItem(CLASS_KEY, JSON.stringify(academicClasses)); } catch (e) {}
  try { localStorage.setItem(HOUSE_KEY, JSON.stringify(academicHouses)); } catch (e) {}
}

function loadAcademicCache() {
  academicProgrammes = loadList(PROGRAMME_KEY, [
    { name: 'General Science' },
    { name: 'General Arts' },
    { name: 'Business' }
  ]);
  academicSubjects = loadList(SUBJECT_KEY, defaultSubjectOptions.map(function(name) {
    return { name: name, programme: 'All Programmes' };
  }));
  academicClasses = loadList(CLASS_KEY, [
    { name: 'SCI_24', programme: 'General Science', subjects: defaultSubjectOptions.slice() },
    { name: 'SCI_25', programme: 'General Science', subjects: defaultSubjectOptions.slice() },
    { name: 'ART_24', programme: 'General Arts', subjects: defaultSubjectOptions.slice() },
    { name: 'BUS_24', programme: 'Business', subjects: defaultSubjectOptions.slice() }
  ]);
  academicHouses = loadList(HOUSE_KEY, [
    { name: 'Unity House', residentialStatus: 'Boarding' },
    { name: 'Liberty House', residentialStatus: 'Boarding' },
    { name: 'Day Students', residentialStatus: 'Day' }
  ]);
  availableSubjects = defaultSubjectOptions.slice();
}

function houseStatus(house) {
  return house.residential_status || house.residentialStatus || '';
}

function populateEditHouses(status, selected) {
  var select = document.getElementById('editHouse');
  select.innerHTML = '<option value="">'+(status ? '***SELECT HOUSE***' : 'Select residential status first...')+'</option>';
  academicHouses.filter(function(house) {
    return !status || houseStatus(house) === status;
  }).forEach(function(house) {
    var option = document.createElement('option');
    option.value = house.name;
    option.textContent = house.name;
    if (house.name === selected) option.selected = true;
    select.appendChild(option);
  });
}

function classesForProgramme(programme) {
  return academicClasses.filter(function(cls) { return cls.programme === programme; });
}

function subjectsForProgramme(programme) {
  return academicSubjects.filter(function(subject) {
    return subject.programme === 'All Programmes' || subject.programme === programme;
  }).map(function(subject) { return subject.name; });
}

function subjectsForClass(className, programme) {
  var cls = academicClasses.find(function(item) { return item.name === className; });
  if (cls && cls.subjects && cls.subjects.length) return cls.subjects.slice(0, 12);
  var subjects = subjectsForProgramme(programme);
  return subjects.length ? subjects.slice(0, 12) : defaultSubjectOptions.slice();
}

function populateEditProgrammes(selected) {
  var select = document.getElementById('editLearningArea');
  select.innerHTML = '<option value="">***SELECT LEARNING AREA***</option>';
  academicProgrammes.forEach(function(programme) {

    option.textContent = name.toUpperCase();
    if (name === selected) option.selected = true;

async function loadAcademicData() {
  loadAcademicCache();
  if (window.AxiomDB && AxiomDB.isConfigured()) {
    try {
      var dbProgrammes = await AxiomDB.listProgrammes();
      var dbSubjects = await AxiomDB.listSubjects();
      var dbClasses = await AxiomDB.listClasses();
      var dbHouses = AxiomDB.listHouses ? await AxiomDB.listHouses() : [];
      if (dbProgrammes && dbProgrammes.length) {
        academicProgrammes = dbProgrammes.map(function(p) {
          return { id: p.id, name: p.name, code: p.code || '', department: p.department || '' };
        });
      }
      if (dbSubjects && dbSubjects.length) academicSubjects = dbSubjects.map(mapDbSubject);
      if (dbClasses && dbClasses.length) academicClasses = dbClasses;
      if (dbHouses && dbHouses.length) academicHouses = dbHouses;
      saveAcademicCache();
    } catch (err) {
      console.error(err);
      Portal.toast('Could not load programme/class/subject setup: ' + (err.message || 'Unknown error'), true);
    }
  }
  populateEditProgrammes('');
  populateEditClasses('', '');
  populateFilterProgrammes('');
  populateFilterClasses('', '');
}

function mapDbStudent(row) {
  var className = row.classes && row.classes.name ? row.classes.name : (row.class_name || '');
  var learningArea = row.classes && row.classes.programmes ? row.classes.programmes.name : (row.programme || '');
  var fullName = [row.first_name, row.surname, row.other_names].filter(Boolean).join(' ').toUpperCase();
  studentDetails[row.ass_ref_id] = {
    surname: row.surname || '',
    firstName: row.first_name || '',
    otherNames: row.other_names || '',
    guardian: row.guardian_name || '',
    relationship: row.relationship || 'Guardian',
    phone: row.phone_number || '',
    profession: row.profession || '',
    address: row.residential_address || '',
    disability: row.disability_status || 'No',
    learningArea: learningArea || 'General Science',
    yearAdmitted: row.year_admitted || '',
    studentLevel: row.student_level || (row.classes && row.classes.year_level) || levelFromAdmissionYear(row.year_admitted),
    residentialStatus: row.residential_status || '',
    house: row.houses && row.houses.name ? row.houses.name : (row.house_name || ''),
    houseId: row.house_id || '',
    photoUrl: row.passport_url || '',
    subjects: subjectsForClass(className, learningArea || 'General Science'),
    sourceRow: row
  };
  return [
    row.ass_ref_id,
    fullName,
    row.ghana_card_number || '',
    (row.gender || '').toUpperCase(),
    row.date_of_birth || '',
    className,
    (row.created_at || '').slice(0, 10),
    row.inserted_by || '',
    row.status || 'Active',
    row.id || '',
    row.passport_url || ''
  ];
}

async function loadStudentsFromSupabase() {
  if (!window.AxiomDB || !AxiomDB.isConfigured()) return;
  try {
    var dbStudents = await AxiomDB.listStudents();
    if (dbStudents && dbStudents.length) {
      students = removeDeletedStudents(dbStudents.map(mapDbStudent));
    } else {
      students = [];
    }
    studentsLoaded = true;
  } catch (err) {
    console.error(err);
    Portal.toast('Could not load students from Supabase: ' + (err.message || 'Unknown error'), true);
  }
}

function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, function(char) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[char];
  });
}

function initials(name) {
  return String(name || 'ST').split(' ').filter(Boolean).slice(0, 2).map(function(part) { return part.charAt(0); }).join('').toUpperCase() || 'ST';
}

function renderRows(data, message) {

    document.querySelector('#studentTable tbody').innerHTML = '<tr><td colspan="9" style="text-align:center;padding:28px;font-weight:800;color:#6b7280">'+(message || 'No students found.')+'</td></tr>';
    document.getElementById('studentTotal').textContent = 0;
    return;
  }

function fileToDataUrl(file) {

  });

function applySearch() {
  if (!studentFilterApplied) {
    showStudentFilterPending('Selections are pending. Click Filter to load students.');
    return;
  }
  var q = currentStudentSearchQuery();
  var programmeFilter = document.getElementById('learningArea').value;
  var classFilter = document.getElementById('classFilter').value;
  var yearFilter = document.getElementById('yearFilter').value;
  var filtered = students.filter(function(row) {
    var detail = studentDetails[row[0]] || {};
    if (programmeFilter && detail.learningArea !== programmeFilter) return false;
    if (classFilter && row[5] !== classFilter) return false;
    if (yearFilter && currentStudentLevel(row) !== yearFilter) return false;
    if (!q) return true;
    return studentSearchText(row).indexOf(q) > -1;
  });
  renderRows(filtered);
}

function downloadExcel(filename, sheetName, headers, rows) {
  if (!window.XLSX) throw new Error('Excel exporter could not load. Check the internet connection and reload.');
  var worksheet = XLSX.utils.aoa_to_sheet([headers].concat(rows));
  worksheet['!cols'] = headers.map(function(header, index) {
    var width = String(header).length;
    rows.forEach(function(row) { width = Math.max(width, String(row[index] === null || row[index] === undefined ? '' : row[index]).length); });
    return { wch: Math.min(Math.max(width + 2, 12), 36) };
  });
  var workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, String(sheetName || 'Data').slice(0, 31));
  XLSX.writeFile(workbook, filename);
}

document.getElementById('progressAll').addEventListener('click', async function() {
  var rows = currentFilteredStudents();
  if (!rows.length) {
    Portal.toast('No students found to progress.', true);
    return;
  }
  var transitions = rows.filter(function(row) {
    var status = String(row[8] || 'Active').toLowerCase();
    return status !== 'transferred' && status !== 'dropped' && status !== 'completed';
  }).map(function(row) {
    var fromLevel = currentStudentLevel(row);
    return { assRef: row[0], fromLevel: fromLevel, toLevel: nextStudentLevel(fromLevel) };
  }).filter(function(item) { return item.fromLevel !== 'Completed'; });
  if (!transitions.length) {
    Portal.toast('All selected students have already completed.', true);
    return;
  }
  if (!window.confirm('Progress ' + transitions.length + ' selected students to their next level? This action updates their student records.')) return;

  var button = document.getElementById('progressAll');
  button.disabled = true;
  button.classList.add('loading');
  button.setAttribute('aria-busy', 'true');
  try {
    if (window.AxiomDB && AxiomDB.isConfigured()) {
      if (!AxiomDB.progressStudents) throw new Error('Student progression database function is not available.');
      await AxiomDB.progressStudents(transitions.map(function(item) { return item.assRef; }));
    }

    saveLocalProgression(transitions);
    var batches = [];
    try { batches = JSON.parse(localStorage.getItem(PROGRESSION_KEY) || '[]'); } catch (e) {}
    batches.push({
      id: 'PROG-' + Date.now(),
      date: new Date().toISOString(),
      learningArea: document.getElementById('learningArea').value,
      className: document.getElementById('classFilter').value,
      students: transitions
    });
    localStorage.setItem(PROGRESSION_KEY, JSON.stringify(batches));
    if (window.AxiomDB && AxiomDB.isConfigured()) {
      await loadStudentsFromSupabase();
      applySearch();
    } else {
      applySearch();
    }
    Portal.toast(transitions.length + ' students progressed successfully.');
  } catch (err) {
    console.error(err);
    Portal.toast('Could not progress students: ' + (err.message || 'Unknown error'), true);
  } finally {
    button.disabled = false;
    button.classList.remove('loading');
    button.removeAttribute('aria-busy');
  }
});

document.getElementById('editStudentForm').addEventListener('submit', function(e) {
  e.preventDefault();

  if (!student) return;
  async function saveStudentEdit() {
    var detail = ensureStudentDetail(student);
    detail.surname = document.getElementById('editSurname').value.trim();
    detail.firstName = document.getElementById('editFirstName').value.trim();
    detail.otherNames = document.getElementById('editOtherNames').value.trim();
    detail.guardian = document.getElementById('editGuardian').value.trim();

    detail.phone = document.getElementById('editPhone').value.trim();

    detail.address = document.getElementById('editAddress').value.trim();
    detail.disability = document.getElementById('editDisability').value;
    detail.learningArea = document.getElementById('editLearningArea').value;
    detail.yearAdmitted = Number(document.getElementById('editYearAdmitted').value);
    detail.studentLevel = document.getElementById('editStudentLevel').value || levelFromAdmissionYear(detail.yearAdmitted);
    detail.residentialStatus = document.getElementById('editResidentialStatus').value;
    detail.house = document.getElementById('editHouse').value;
    detail.subjects = currentEditSubjects();
    var photoFile = document.getElementById('editPhoto').files[0] || null;
    if (photoFile) {
      if (window.AxiomDB && AxiomDB.isConfigured() && AxiomDB.uploadStudentPassport) {
        detail.photoUrl = await AxiomDB.uploadStudentPassport(student[0], photoFile);
      } else {
        detail.photoUrl = await fileToDataUrl(photoFile);
      }
    }
    student[1] = studentFullName(detail).toUpperCase();
    student[2] = document.getElementById('editNatId').value.trim();
    student[3] = document.getElementById('editGender').value;
    student[4] = document.getElementById('editDob').value;
    student[5] = document.getElementById('editClass').value;
    student[6] = document.getElementById('editCreatedDate').value;
    student[7] = document.getElementById('editInsertedBy').value.trim();
    student[8] = document.getElementById('editStatus').value;
    student[10] = detail.photoUrl || '';
    var selectedClass = academicClasses.find(function(cls) { return cls.name === student[5]; });
    var selectedHouse = academicHouses.find(function(house) { return house.name === detail.house; });
    var payload = {
      surname: detail.surname,
      first_name: detail.firstName,
      other_names: detail.otherNames,
      ghana_card_number: student[2],
      gender: student[3].charAt(0) + student[3].slice(1).toLowerCase(),
      disability_status: detail.disability,
      date_of_birth: student[4] || null,
      guardian_name: detail.guardian,
      relationship: detail.relationship,
      phone_number: detail.phone,
      profession: detail.profession,
      residential_address: detail.address,
      residential_status: detail.residentialStatus,
      year_admitted: detail.yearAdmitted,
      student_level: detail.studentLevel,
      passport_url: detail.photoUrl || null,
      status: student[8],
      inserted_by: student[7]
    };
    if (selectedClass && selectedClass.id) payload.class_id = selectedClass.id;
    if (selectedHouse && selectedHouse.id) payload.house_id = selectedHouse.id;
    else if (!detail.house) payload.house_id = null;

    if (window.AxiomDB && AxiomDB.isConfigured() && AxiomDB.updateStudentByAssRef) {
      try {
        await AxiomDB.updateStudentByAssRef(student[0], Object.assign({}, payload));
      } catch (updateError) {
        if (/student_level|schema cache/i.test(updateError.message || '')) {
          var compatiblePayload = Object.assign({}, payload);
          delete compatiblePayload.student_level;
          await AxiomDB.updateStudentByAssRef(student[0], compatiblePayload);
        } else {
          throw updateError;
        }
      }
    }
    var levels = loadStudentLevels();
    levels[student[0]] = detail.studentLevel;
    localStorage.setItem(STUDENT_LEVELS_KEY, JSON.stringify(levels));
    var registered = [];
    try { registered = JSON.parse(localStorage.getItem('axiom_registered_students') || '[]'); } catch (err) {}
    if (Array.isArray(registered)) {
      registered.forEach(function(record) {
        if ((record.ass_ref_id || record.assRef || record.ass_ref) !== student[0]) return;
        Object.assign(record, payload, {
          class_name: student[5],
          programme: detail.learningArea,
          house_name: detail.house,
          name: studentFullName(detail)
        });
      });
      localStorage.setItem('axiom_registered_students', JSON.stringify(registered));
    }
    applySearch();
    closeEditStudent();
    Portal.toast('Student information updated.');
  }
  saveStudentEdit().catch(function(err) {
    console.error(err);
    Portal.toast('Could not update student: ' + (err.message || 'Unknown error'), true);
  });
});

      }
      rememberDeletedStudent(assRef);
      students = students.filter(function(student) { return student[0] !== assRef; });
      delete studentDetails[assRef];
      applySearch();
      Portal.toast('Student deleted.');
    }
    deleteStudent().catch(function(err) {
      console.error(err);
      Portal.toast('Could not delete student: ' + (err.message || 'Unknown error'), true);
    });
    return;
  }
  if (btn.dataset.act === 'Repeat') {
    var student = findStudent(assRef);
    if (!student) return;
    async function repeatStudent() {
      student[8] = 'Repeated';
      if (window.AxiomDB && AxiomDB.isConfigured() && AxiomDB.updateStudentByAssRef) {
        await AxiomDB.updateStudentByAssRef(assRef, { status: 'Repeated' });
      }
      applySearch();
      Portal.toast(name + ' marked as repeated.');
    }
    repeatStudent().catch(function(err) {
      console.error(err);
      Portal.toast('Could not repeat student: ' + (err.message || 'Unknown error'), true);
    });
    return;
  }
  Portal.toast(btn.dataset.act + ' - ' + name);
});
</script>
