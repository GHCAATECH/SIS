<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Super Admin Login - AXIOMBYTE SMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="../assets/app.css?v=20260714-portalstaffsidebar" />
<style>
  body { min-width: 1000px; }
  .super-login-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px;
    background: radial-gradient(circle at top left, rgba(20,184,166,.18), transparent 30%), #f8fafc;
  }
  .super-login-card {
    width: 480px;
    background: #fff;
    border: 1px solid rgba(226,232,240,.95);
    border-radius: 18px;
    box-shadow: 0 18px 45px rgba(15,23,42,.13);
    padding: 30px;
  }
  .super-brand { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
  .super-brand .logo {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: grid;
    place-items: center;
    background: linear-gradient(135deg, #042f2e, #0f766e);
    color: #fff;
    font-size: 22px;
    box-shadow: 0 10px 24px rgba(15,118,110,.25);
  }
  .super-brand h1 { font-size: 22px; margin: 0; color: #0f172a; }
  .super-brand small { display: block; color: #64748b; margin-top: 3px; }
  .super-note {
    margin: 0 0 18px;
    border: 1px solid rgba(20,184,166,.25);
    background: rgba(20,184,166,.08);
    color: #0f766e;
    padding: 12px 14px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
  }
  .super-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
  .super-actions a { color: #0f766e; font-weight: 700; }
  .home-link { position:fixed; top:18px; left:18px; z-index:20; display:inline-flex; align-items:center; gap:8px; padding:9px 12px; border-radius:10px; background:#fff; border:1px solid #e2e8f0; color:#0f766e; font-weight:900; box-shadow:0 8px 22px rgba(15,23,42,.08); }
</style>
</head>
<body class="footer-shell">
<a class="home-link" href="../index.html"><i class="fas fa-house"></i> Back to Home</a>
<div class="super-login-shell">
  <form class="super-login-card" id="superLoginForm">
    <div class="super-brand">
      <span class="logo"><i class="fas fa-user-shield"></i></span>
      <div>
        <h1>Super Admin Login</h1>
        <small>Manage all schools and school administrators</small>
      </div>
    </div>
    <p class="super-note"><i class="fas fa-shield-halved"></i> This account is for AXIOMBYTE multi-school control only.</p>
    <div class="grid" style="gap:14px">
      <div class="field">
        <label>Username or Email <span class="req">*</span></label>
        <input class="input" id="superUsername" required autocomplete="username" placeholder="superadmin" />
      </div>
      <div class="field">
        <label>Password <span class="req">*</span></label>
        <input class="input" id="superPassword" type="password" required autocomplete="current-password" placeholder="Enter super admin password" />
      </div>
    </div>
    <div class="super-actions">
      <a href="../login.html"><i class="fas fa-arrow-left"></i> All portals</a>
      <button class="btn btn--primary" type="submit"><i class="fas fa-right-to-bracket"></i> Login</button>
    </div>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/supabase-client.js"></script>
<script src="../assets/shell.js?v=20260714-portalstaffsidebar"></script>
<script>
document.body.appendChild(document.createElement('div')).outerHTML = '<div class="toast-host" id="toastHost"></div>';
document.getElementById('superLoginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var username = document.getElementById('superUsername').value.trim();
  var password = document.getElementById('superPassword').value.trim();
  async function signIn() {
    if (!window.AxiomDB || !AxiomDB.isConfigured() || !AxiomDB.loginSuperAdmin) {
      Portal.toast('Supabase is not configured for super admin login.', true);
      return;
    }
    var user = await AxiomDB.loginSuperAdmin(username, password);
    if (!user || user.error) {
      var message = 'Invalid super admin username or account password.';
      if (user && user.error === 'super_admin_suspended') message = 'This super admin account is suspended.';
      if (user && user.error === 'auth_not_linked') message = 'No linked Supabase Auth account exists for this super admin.';
      Portal.toast(message, true);
      return;
    }
    localStorage.setItem('axiom_current_user', JSON.stringify(user));
    location.href = location.pathname.indexOf('/admin/') > -1 ? 'superadmin.html' : 'admin/superadmin.html';
  }
  signIn().catch(function(err) {
    console.error(err);
    Portal.toast('Could not login: ' + (err.message || 'Unknown error'), true);
  });
});
</script>
<footer class="axiom-standard-footer" style="padding:16px 18px;text-align:center;color:#64748b;font-weight:800;font-size:13px;border-top:1px solid rgba(226,232,240,.9);background:#fff;line-height:1.6;">
  <span>&copy; 2026 AXIOMBYTE SMS. All rights reserved.</span><span style="display:inline-block;margin-left:56px;">Built for secure school operations.</span>
</footer>
</body>
</html>
