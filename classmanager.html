<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manage Classes - AXIOMBYTE SMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="assets/app.css?v=20260717-sky-navy-theme1" />
<style>
  .class-shell {
    width: 100%;
    margin: 0;
    padding: 18px 22px 12px;
    border: 1px solid #002B4C;
    border-radius: 8px;
  }
  .class-form-top {
    display: grid;
    grid-template-columns: minmax(260px, 1fr) minmax(360px, 480px) minmax(120px, 1fr);
    align-items: start;
    gap: 18px;
  }
  .class-form-heading { display: flex; align-items: flex-start; gap: 14px; }
  .class-form-heading__icon {
    display: grid;
    width: 42px;
    height: 42px;
    flex: 0 0 42px;
    place-items: center;
    border-radius: 5px;
    font-size: 20px;
  }
  .class-form-heading h2 { margin: 0 0 5px; font-size: 20px; line-height: 1.1; }
  .required-note { margin: 0; font-size: 14px; font-weight: 700; }
  .class-form label {
    display: block;
    margin: 0 0 6px;
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
  }
  .class-form .req { color: #ef4444; }
  .class-programme { min-width: 0; }
  .class-form .select,
  .class-form .input {
    width: 100%;
    border-radius: 6px;
    min-height: 42px;
    font-size: 14px;
    padding: 8px 14px;
  }
  .subjects-section { margin-top: 16px; }
  .subjects-heading { margin-bottom: 8px; }
  .subject-selection-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px 28px;
  }
  .subject-option { min-width: 0; }
  .subject-option label {
    margin-bottom: 5px;
    font-size: 12px;
    white-space: nowrap;
  }
  .class-name-field {
    width: min(100%, 60rem);
    margin: 16px auto 0;
    text-align: center;
  }
  .class-name-field .input { text-align: left; }
  .class-actions {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 16px;
    padding: 0;
    border: 0;
  }
  .class-actions .btn {
    min-width: 146px;
    height: 42px;
    border-radius: 6px;
    font-weight: 800;
  }
  .class-list {
    width: 100%;
    margin: 10px 0 0;
    border-radius: 8px;
  }
  .class-list .card__head { padding: 9px 14px; font-size: 17px; }
  .class-list .tbl { min-width: 760px; }
  .class-list .tbl th { padding: 8px 16px; font-size: 13px; }
  .class-list .tbl td { padding: 7px 16px; font-size: 13px; }
  .subject-summary { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 0; }
  .class-list .row-actions { display: flex; justify-content: center; gap: 8px; }
  .class-list .row-actions .btn { width: 34px; min-width: 34px; height: 28px; padding: 0; }
  .class-pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 10px 14px 14px;
  }
  .class-page-info { font-size: 13px; font-weight: 700; white-space: nowrap; }
  .class-page-buttons { display: flex; align-items: center; gap: 8px; }
  .class-page-button {
    min-height: 34px;
    min-width: 34px;
    padding: 6px 12px;
    border-radius: 5px;
    font: inherit;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
  }

  @media (max-width: 980px) {
    .class-form-top { grid-template-columns: 1fr 1fr; }
    .class-programme { grid-column: 2; }
    .subject-selection-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  }
  @media (max-width: 700px) {
    .class-shell { padding: 16px; }
    .class-form-top { grid-template-columns: 1fr; }
    .class-programme { grid-column: auto; }
    .subject-selection-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .class-actions { gap: 8px; flex-wrap: wrap; }
    .class-actions .btn { min-width: 120px; }
    .class-pagination { align-items: flex-start; flex-direction: column; }
  }
  @media (max-width: 460px) {
    .subject-selection-grid { grid-template-columns: 1fr; }
    .class-actions .btn { width: 100%; }
  }
</style>
<link rel="stylesheet" href="assets/fit-wrap.css?v=20260717-sky-navy-theme1" />
<link rel="stylesheet" href="assets/theme.css?v=20260719-icons-sky" />
<style>
  /* Class manager colour system */
  body.portal-shell,
  .content,
  .class-shell,
  .content .card,
  .content .card__head,
  .content .card__body,
  .content .table-wrap { background: #C0EBFF; color: #002B4C; }

  .content .card,
  .content .card__head,
  .content .card__body,
  .content .table-wrap,
  .content .tbl,
  .content .tbl th,
  .content .tbl td,
  .class-actions { border-color: #002B4C; }

  .content .card { border: 1px solid #002B4C; box-shadow: none; }
  .content .card__head { border-bottom: 1px solid #002B4C; }
  .class-form label,
  .content .tbl th,
  .content .tbl td,
  .content .card__head,
  .required-note { color: #002B4C; }

  .class-form .select,
  .class-form .input {
    background: #C0EBFF;
    color: #002B4C;
    border-color: #002B4C;
  }

  .content .tbl th { background: #002B4C; color: #C0EBFF; border-color: #002B4C; }
  .content .tbl td { background: #C0EBFF; border-color: #002B4C; }
  .content .tbl tbody tr:hover td { background: #C0EBFF; }

  .class-actions .btn,
  .content .row-actions .btn {
    background: #002B4C;
    border: 1px solid #002B4C;
    color: #C0EBFF;
  }
  .class-actions .btn i,
  .content .row-actions .btn i { color: #C0EBFF; }
  .class-form-heading__icon { background: #002B4C; color: #C0EBFF; }
  .class-page-button { background: #C0EBFF; border: 1px solid #002B4C; color: #002B4C; }
  .class-page-button.active,
  .class-page-button:hover:not(:disabled) { background: #002B4C; color: #C0EBFF; }
  .class-page-button:disabled { cursor: not-allowed; opacity: .5; }
</style>
</head>
<body class="portal-shell footer-shell">
<div class="main">
  <main class="content">
    <div class="class-shell">
      <form id="classForm" class="class-form">
        <div class="class-form-top">
          <div class="class-form-heading">
            <span class="class-form-heading__icon"><i class="fas fa-school"></i></span>
            <div><h2>Add New Class</h2><p class="required-note">All Fields Marked <span class="req">*</span> Are Mandatory</p></div>
          </div>
          <div class="field class-programme">
            <label>Programme: <span class="req">*</span></label>
            <select class="select" id="programmeSelect" required>
              <option value="">***SELECT PROGRAMME***</option>
            </select>
          </div>
        </div>

        <div class="subjects-section">
          <label class="subjects-heading">Subjects: <span class="req">*</span></label>
          <div class="subject-selection-grid" id="subjectSelectors"></div>
        </div>

        <div class="field class-name-field">
          <label>Class Name: <span class="req">*</span></label>
          <input class="input" id="className" required placeholder="Enter class name...">
        </div>

        <div class="class-actions">
          <button type="submit" class="btn btn--primary"><i class="fas fa-floppy-disk"></i> Submit</button>
          <button type="button" class="btn btn-refresh" id="refreshBtn"><i class="fas fa-rotate"></i> Refresh</button>
          <button type="button" class="btn btn-update" id="updateBtn"><i class="fas fa-pen"></i> Update</button>
        </div>
      </form>
    </div>

    <div class="card card--pad-0 class-list">
      <div class="card__head"><i class="fas fa-table-list"></i> Existing Classes</div>
      <div class="table-wrap">
        <table class="tbl" id="classTable">
          <thead><tr><th>Class Name</th><th>Programme</th><th>Subjects</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="class-pagination" id="classPagination" aria-label="Class table pagination"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js?v=20260719-privilege-session1"></script>
<script src="assets/shell.js?v=20260719-privilege-access1"></script>
<script>
Portal.init({ active: 'classmanager' });

var PROGRAMME_KEY = 'axiom_programmes';
var SUBJECT_KEY = 'axiom_subjects';
var CLASS_KEY = 'axiom_classes';
var editingIndex = -1;
var currentClassPage = 1;
var classesPerPage = 5;

var defaultProgrammes = [
  { name: 'General Science', department: 'Science Department' },
  { name: 'General Arts', department: 'Arts Department' },
  { name: 'Business', department: 'Business Department' },
  { name: 'Visual Arts', department: 'Visual Arts Department' },
  { name: 'Home Economics', department: 'Home Economics Department' },
  { name: 'Agricultural Science', department: 'Agriculture Department' }
];

var defaultSubjects = [
  { name: 'Core Mathematics', type: 'Core', programme: 'All Programmes' },
  { name: 'English Language', type: 'Core', programme: 'All Programmes' },
  { name: 'Integrated Science', type: 'Core', programme: 'All Programmes' },
  { name: 'Social Studies', type: 'Core', programme: 'All Programmes' },
  { name: 'Elective Mathematics', type: 'Elective', programme: 'General Science' },
  { name: 'Physics', type: 'Elective', programme: 'General Science' },
  { name: 'Chemistry', type: 'Elective', programme: 'General Science' },
  { name: 'Biology', type: 'Elective', programme: 'General Science' },
  { name: 'Economics', type: 'Elective', programme: 'General Arts' },
  { name: 'Geography', type: 'Elective', programme: 'General Arts' },
  { name: 'Government', type: 'Elective', programme: 'General Arts' },
  { name: 'History', type: 'Elective', programme: 'General Arts' },
  { name: 'Financial Accounting', type: 'Elective', programme: 'Business' },
  { name: 'Cost Accounting', type: 'Elective', programme: 'Business' },
  { name: 'Business Management', type: 'Elective', programme: 'Business' }
];

function loadList(key, fallback) {
  try {
    var saved = localStorage.getItem(key);
    return saved ? JSON.parse(saved) : fallback.slice();
  } catch (e) {
    return fallback.slice();
  }
}

function saveClasses() {
  try { localStorage.setItem(CLASS_KEY, JSON.stringify(classes)); } catch (e) {}
}

function saveList(key, list) {
  try { localStorage.setItem(key, JSON.stringify(list)); } catch (e) {}
}

function itemName(item) {
  return typeof item === 'string' ? item : item.name;
}

function subjectMatchesProgramme(subject, programme) {
  return subject.programme === 'All Programmes' || subject.programme === programme;
}

var classes = loadList(CLASS_KEY, [
  { name: 'SCI_24', department:'Science Department', programme: 'General Science', subjects: ['Core Mathematics', 'English Language', 'Integrated Science', 'Social Studies', 'Physics', 'Chemistry'] },
  { name: 'BUS_24', department:'Business Department', programme: 'Business', subjects: ['Core Mathematics', 'English Language', 'Social Studies', 'Financial Accounting', 'Cost Accounting', 'Business Management'] }
]);
var programmes = loadList(PROGRAMME_KEY, defaultProgrammes);
var subjects = loadList(SUBJECT_KEY, defaultSubjects);

function mapDbSubject(subject) {
  return {
    id: subject.id,
    name: subject.name,
    code: subject.code || '',
    type: subject.subject_type || subject.type || 'Elective',
    programme: subject.applies_to_all_programmes ? 'All Programmes' : ((subject.programmes && subject.programmes.name) || subject.programme || '')
  };
}

function populateProgrammes() {
  var select = document.getElementById('programmeSelect');
  var selectedProgramme = select.value;
  select.innerHTML = '<option value="">***SELECT PROGRAMME***</option>';
  programmes.forEach(function(programme) {
    var name = itemName(programme);
    if (!name) return;
    var option = document.createElement('option');
    option.value = name;
    option.textContent = name.toUpperCase();
    option.selected = name === selectedProgramme;
    select.appendChild(option);
  });
}

function makeSubjectSelect(index, availableSubjects, selectedValue, selectedValues) {
  var field = document.createElement('div');
  field.className = 'subject-option';
  var label = document.createElement('label');
  label.textContent = 'Subject ' + String(index + 1).padStart(2, '0');
  var select = document.createElement('select');
  select.className = 'select subject-select';
  select.dataset.slot = index;
  select.required = index === 0;
  select.innerHTML = '<option value="">***SELECT SUBJECT***</option>';
  availableSubjects.forEach(function(subject) {
    var option = document.createElement('option');
    option.value = subject.name;
    option.textContent = subject.name.toUpperCase();
    if (subject.name === selectedValue) option.selected = true;
    if (subject.name !== selectedValue && selectedValues.indexOf(subject.name) > -1) option.disabled = true;
    select.appendChild(option);
  });
  field.appendChild(label);
  field.appendChild(select);
  return field;
}

function populateSubjects(selectedSubjects) {
  var programme = document.getElementById('programmeSelect').value;
  var box = document.getElementById('subjectSelectors');
  var matchingSubjects = subjects.filter(function(subject) {
    return programme && subjectMatchesProgramme(subject, programme);
  });
  selectedSubjects = (selectedSubjects || []).slice(0, 12);
  box.innerHTML = '';
  for (var i = 0; i < 12; i++) {
    box.appendChild(makeSubjectSelect(i, matchingSubjects, selectedSubjects[i] || '', selectedSubjects));
  }
}

function selectedSubjects() {
  return Array.from(document.querySelectorAll('.subject-select')).map(function(select) {
    return select.value;
  }).filter(Boolean);
}

function resetForm() {
  editingIndex = -1;
  document.getElementById('classForm').reset();
  populateProgrammes();
  populateSubjects();
}

function renderClasses() {
  var totalPages = Math.max(1, Math.ceil(classes.length / classesPerPage));
  currentClassPage = Math.min(Math.max(currentClassPage, 1), totalPages);
  var startIndex = (currentClassPage - 1) * classesPerPage;
  var pageClasses = classes.slice(startIndex, startIndex + classesPerPage);
  document.querySelector('#classTable tbody').innerHTML = pageClasses.length ? pageClasses.map(function(cls, pageIndex) {
    var idx = startIndex + pageIndex;
    return '<tr><td style="font-weight:700">'+cls.name+'</td><td>'+cls.programme+'</td><td class="subject-summary">'+cls.subjects.join(', ')+'</td>'+
      '<td><div class="row-actions">'+
        '<button class="btn btn--sm" data-act="Edit" data-i="'+idx+'" title="Edit class"><i class="fas fa-pen"></i></button>'+
        '<button class="btn btn--danger btn--sm" data-act="Drop" data-i="'+idx+'" title="Delete class"><i class="fas fa-trash"></i></button>'+
      '</div></td></tr>';
  }).join('') : '<tr><td colspan="4" style="padding:28px;text-align:center;font-weight:700">No classes found.</td></tr>';
  renderClassPagination(totalPages, startIndex, pageClasses.length);
}

function renderClassPagination(totalPages, startIndex, visibleCount) {
  var pagination = document.getElementById('classPagination');
  var first = classes.length ? startIndex + 1 : 0;
  var last = classes.length ? startIndex + visibleCount : 0;
  var buttons = '<button type="button" class="class-page-button" data-page="'+(currentClassPage - 1)+'" '+(currentClassPage === 1 ? 'disabled' : '')+'>&laquo; Previous</button>';
  for (var page = 1; page <= totalPages; page += 1) {
    buttons += '<button type="button" class="class-page-button'+(page === currentClassPage ? ' active' : '')+'" data-page="'+page+'" '+(page === currentClassPage ? 'aria-current="page"' : '')+'>'+page+'</button>';
  }
  buttons += '<button type="button" class="class-page-button" data-page="'+(currentClassPage + 1)+'" '+(currentClassPage === totalPages ? 'disabled' : '')+'>Next &raquo;</button>';
  pagination.innerHTML = '<span class="class-page-info">Showing '+first+' to '+last+' of '+classes.length+' entries</span><div class="class-page-buttons">'+buttons+'</div>';
}

populateProgrammes();
populateSubjects();
renderClasses();

async function refreshAcademicSetupFromSupabase() {
  if (!window.AxiomDB || !AxiomDB.isConfigured()) return;
  try {
    var setup = await Promise.all([AxiomDB.listProgrammes(), AxiomDB.listSubjects(), AxiomDB.listClasses()]);
    var dbProgrammes = setup[0];
    var dbSubjects = setup[1];
    var dbClasses = setup[2];
    if (dbProgrammes && dbProgrammes.length) {
      programmes = dbProgrammes.map(function(p) {
        return { id: p.id, name: p.name, code: p.code || '', department_id: p.department_id || '', department: (p.departments && p.departments.name) || p.department || '' };
      });
      saveList(PROGRAMME_KEY, programmes);
    }
    if (dbSubjects && dbSubjects.length) {
      subjects = dbSubjects.map(mapDbSubject);
      saveList(SUBJECT_KEY, subjects);
    }
    if (dbClasses && dbClasses.length) {
      classes = dbClasses;
      saveClasses();
    }
    currentClassPage = 1;
    populateProgrammes();
    populateSubjects();
    renderClasses();
  } catch (err) {
    console.error(err);
    Portal.toast('Could not load class setup from Supabase: ' + (err.message || 'Unknown error'), true);
  }
}
refreshAcademicSetupFromSupabase();

document.getElementById('programmeSelect').addEventListener('change', function() {
  populateSubjects();
});

document.getElementById('subjectSelectors').addEventListener('change', function(e) {
  if (!e.target.matches('.subject-select')) return;
  var selected = selectedSubjects();
  if (new Set(selected).size !== selected.length) {
    Portal.toast('Each subject can be selected only once.', true);
    e.target.value = '';
  }
  populateSubjects(selectedSubjects());
});

document.getElementById('classPagination').addEventListener('click', function(e) {
  var button = e.target.closest('button[data-page]');
  if (!button || button.disabled) return;
  currentClassPage = Number(button.dataset.page) || 1;
  renderClasses();
});

document.getElementById('classForm').addEventListener('submit', function(e) {
  e.preventDefault();
  async function saveClassRecord() {
    var selected = selectedSubjects();
    if (!selected.length) {
      Portal.toast('Select at least one subject.', true);
      return;
    }
    var classRecord = {
      name: document.getElementById('className').value.trim(),
      programme: document.getElementById('programmeSelect').value,
      subjects: selected.slice(0, 12)
    };
    if (new Set(selected).size !== selected.length) {
      Portal.toast('A subject cannot be selected more than once.', true);
      return;
    }
    var wasUpdate = editingIndex > -1;
    if (window.AxiomDB && AxiomDB.isConfigured()) {
      if (editingIndex > -1 && classes[editingIndex].id && AxiomDB.updateClass) {
        classRecord = await AxiomDB.updateClass(classes[editingIndex].id, classRecord);
      } else if (AxiomDB.createClass) {
        classRecord = await AxiomDB.createClass(classRecord);
      }
    }
    if (editingIndex > -1) classes[editingIndex] = classRecord;
    else {
      classes.push(classRecord);
      currentClassPage = Math.max(1, Math.ceil(classes.length / classesPerPage));
    }
    saveClasses();
    renderClasses();
    resetForm();
    Portal.toast(wasUpdate ? 'Class updated.' : 'Class added.');
  }
  saveClassRecord().catch(function(err) {
    console.error(err);
    Portal.toast('Could not save class: ' + (err.message || 'Unknown error'), true);
  });
});

document.getElementById('refreshBtn').addEventListener('click', resetForm);

document.getElementById('updateBtn').addEventListener('click', function() {
  if (editingIndex < 0) {
    Portal.toast('Select a class from the table to update.', true);
    return;
  }
  document.getElementById('classForm').requestSubmit();
});

document.getElementById('classTable').addEventListener('click', function(e) {
  var b = e.target.closest('button[data-act]');
  if (!b) return;
  var i = +b.dataset.i;
  if (b.dataset.act === 'Drop') {
    if (confirm('Drop '+classes[i].name+'?')) {
      async function dropClass() {
        if (window.AxiomDB && AxiomDB.isConfigured() && AxiomDB.deleteClass && classes[i].id) {
          await AxiomDB.deleteClass(classes[i].id);
        }
      classes.splice(i, 1);
      saveClasses();
      renderClasses();
      Portal.toast('Class dropped.');
      }
      dropClass().catch(function(err) {
        console.error(err);
        Portal.toast('Could not drop class: ' + (err.message || 'Unknown error'), true);
      });
    }
    return;
  }
  editingIndex = i;
  document.getElementById('programmeSelect').value = classes[i].programme;
  populateSubjects(classes[i].subjects);
  document.getElementById('className').value = classes[i].name;
  Portal.toast('Class loaded for editing.');
});
</script>
