<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Manage Departments - AXIOMBYTE SMS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link rel="stylesheet" href="assets/app.css?v=20260717-sky-navy-theme1" />
<style>
  .department-layout { display:grid; grid-template-columns:minmax(300px,.7fr) minmax(600px,1.5fr); gap:16px; align-items:start; }
  #departmentTable { width:100%; table-layout:fixed; }
  #departmentTable th, #departmentTable td { padding:9px 10px; vertical-align:middle; }
  #departmentTable th:nth-child(1) { width:42%; }
  #departmentTable th:nth-child(2) { width:18%; }
  #departmentTable th:nth-child(3) { width:40%; }
  #departmentTable .row-actions { display:flex; align-items:center; justify-content:flex-start; gap:6px; flex-wrap:nowrap; }
  #departmentTable .row-actions .btn { min-width:0; min-height:30px; padding:5px 9px; font-size:11px; }
  #departmentTable td:first-child { white-space:normal; overflow-wrap:anywhere; }
  @media (max-width:980px) { .department-layout { grid-template-columns:1fr; } }
  @media (max-width:700px) {
    #departmentTable { min-width:500px; }
    .department-layout .table-wrap { overflow-x:auto; }
  }
</style>
<link rel="stylesheet" href="assets/fit-wrap.css?v=20260717-sky-navy-theme1" />
<link rel="stylesheet" href="assets/theme.css?v=20260719-icons-sky" />
</head>
<body class="portal-shell footer-shell">
<div class="main">
  <main class="content">
    <div class="page-head">
      <span class="ph-ico"><i class="fas fa-building"></i></span>
      <div><h2>Add / Manage Departments</h2><p>Create departments used by Programmes, Classes, and Teaching Staff.</p></div>
    </div>

    <div class="department-layout">
      <section class="card">
        <div class="card__head"><i class="fas fa-plus"></i> Add Department</div>
        <div class="card__body">
          <form id="departmentForm" class="grid" style="gap:14px">
            <div class="field"><label for="departmentName">Department Name <span class="req">*</span></label><input class="input" id="departmentName" required maxlength="120" placeholder="e.g. Science Department" /></div>
            <div class="field"><label for="departmentCode">Department Code</label><input class="input" id="departmentCode" maxlength="20" placeholder="e.g. SCI" /></div>
            <div class="field"><label for="departmentDescription">Description</label><textarea class="input" id="departmentDescription" rows="3" maxlength="300" placeholder="Optional department description"></textarea></div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
              <button class="btn" type="button" id="cancelDepartmentEdit" hidden>Cancel</button>
              <button class="btn btn--primary" type="submit" id="saveDepartment"><i class="fas fa-floppy-disk"></i> Add Department</button>
            </div>
          </form>
        </div>
      </section>

      <section class="card card--pad-0">
        <div class="card__head"><span><i class="fas fa-table-list"></i> Existing Departments</span><button class="btn btn--sm" id="refreshDepartments" type="button"><i class="fas fa-rotate"></i> Refresh</button></div>
        <div class="table-wrap">
          <table class="tbl" id="departmentTable">
            <thead><tr><th>Department</th><th>Code</th><th>Action</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-client.js?v=20260719-privilege-session1"></script>
<script src="assets/shell.js?v=20260719-privilege-access1"></script>
<script>
Portal.init({ active: 'departmentmanager' });

var DEPARTMENT_KEY = 'axiom_departments';
var PROGRAMME_KEY = 'axiom_programmes';
var CLASS_KEY = 'axiom_classes';
var defaultDepartments = [];
var departments = loadList(DEPARTMENT_KEY, defaultDepartments);
var legacyDepartmentNames = ['Science Department','Arts Department','Business Department','Visual Arts Department','Home Economics Department','Agriculture Department'];
departments = departments.filter(function(department) { return legacyDepartmentNames.indexOf(department.name) === -1; });
try { localStorage.setItem(DEPARTMENT_KEY, JSON.stringify(departments)); } catch (err) {}
var programmes = loadList(PROGRAMME_KEY, []);
var classes = loadList(CLASS_KEY, []);
var editingDepartmentIndex = -1;

function esc(value) { return String(value == null ? '' : value).replace(/[&<>"']/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function loadList(key, fallback) { try { var saved = JSON.parse(localStorage.getItem(key) || 'null'); return Array.isArray(saved) ? saved : fallback.slice(); } catch (err) { return fallback.slice(); } }
function saveDepartments() { try { localStorage.setItem(DEPARTMENT_KEY, JSON.stringify(departments)); } catch (err) {} }
function sameName(a, b) { return String(a || '').trim().toLowerCase() === String(b || '').trim().toLowerCase(); }
function programmeDepartment(programme) { return programme.department || (programme.departments && programme.departments.name) || ''; }

function renderDepartments() {
  var body = document.querySelector('#departmentTable tbody');
  if (!departments.length) { body.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:30px;color:var(--text-faint)">No departments created.</td></tr>'; return; }
  body.innerHTML = departments.map(function(department, index) {
    return '<tr><td><b>'+esc(department.name)+'</b></td><td>'+esc(department.code || '-')+'</td><td><div class="row-actions"><button class="btn btn--sm" type="button" data-edit-department="'+index+'"><i class="fas fa-pen"></i> Edit</button><button class="btn btn--danger btn--sm" type="button" data-delete-department="'+index+'"><i class="fas fa-trash"></i> Delete</button></div></td></tr>';
  }).join('');
}

async function refreshDepartments() {
  if (!window.AxiomDB || !AxiomDB.isConfigured() || !AxiomDB.listDepartments) { renderDepartments(); return; }
  try {
    var results = await Promise.all([AxiomDB.listDepartments(), AxiomDB.listProgrammes(), AxiomDB.listClasses()]);
    departments = (results[0] || []).filter(function(department) { return legacyDepartmentNames.indexOf(department.name) === -1; });
    programmes = results[1] || [];
    classes = results[2] || [];
    saveDepartments();
    try { localStorage.setItem(PROGRAMME_KEY, JSON.stringify(programmes)); localStorage.setItem(CLASS_KEY, JSON.stringify(classes)); } catch (err) {}
    renderDepartments();
  } catch (err) { console.error(err); Portal.toast('Could not load departments: '+(err.message || 'Unknown error'), true); }
}

document.getElementById('departmentForm').addEventListener('submit', async function(event) {
  event.preventDefault();
  var name = document.getElementById('departmentName').value.trim();
  if (departments.some(function(department, index) { return index !== editingDepartmentIndex && sameName(department.name, name); })) { Portal.toast('Department already exists.', true); return; }
  var payload = { name:name, code:document.getElementById('departmentCode').value.trim().toUpperCase(), description:document.getElementById('departmentDescription').value.trim() };
  var button = document.getElementById('saveDepartment'); button.disabled = true;
  try {
    var isEditing = editingDepartmentIndex > -1;
    var previous = isEditing ? departments[editingDepartmentIndex] : null;
    var saved = payload;
    if (window.AxiomDB && AxiomDB.isConfigured()) {
      if (isEditing && previous.id && AxiomDB.updateDepartment) saved = await AxiomDB.updateDepartment(previous.id, payload);
      else if (!isEditing && AxiomDB.createDepartment) saved = await AxiomDB.createDepartment(payload);
    }
    if (isEditing) {
      var oldName = previous.name;
      departments[editingDepartmentIndex] = Object.assign({}, previous, saved);
      programmes.forEach(function(programme) { if (sameName(programmeDepartment(programme), oldName)) programme.department = saved.name; });
      classes.forEach(function(classRow) { if (sameName(classRow.department, oldName)) classRow.department = saved.name; });
      try { localStorage.setItem(PROGRAMME_KEY, JSON.stringify(programmes)); localStorage.setItem(CLASS_KEY, JSON.stringify(classes)); } catch (err) {}
    } else departments.push(saved);
    saveDepartments(); resetDepartmentForm(); renderDepartments(); Portal.toast(isEditing ? 'Department updated.' : 'Department added.');
  } catch (err) { console.error(err); Portal.toast('Could not save department: '+(err.message || 'Unknown error'), true); }
  finally { button.disabled = false; }
});

function resetDepartmentForm() {
  editingDepartmentIndex = -1;
  document.getElementById('departmentForm').reset();
  document.getElementById('saveDepartment').innerHTML = '<i class="fas fa-floppy-disk"></i> Add Department';
  document.getElementById('cancelDepartmentEdit').hidden = true;
}

document.getElementById('cancelDepartmentEdit').addEventListener('click', resetDepartmentForm);

document.getElementById('departmentTable').addEventListener('click', async function(event) {
  var editButton = event.target.closest('[data-edit-department]');
  if (editButton) {
    editingDepartmentIndex = Number(editButton.dataset.editDepartment);
    var selected = departments[editingDepartmentIndex];
    document.getElementById('departmentName').value = selected.name || '';
    document.getElementById('departmentCode').value = selected.code || '';
    document.getElementById('departmentDescription').value = selected.description || '';
    document.getElementById('saveDepartment').innerHTML = '<i class="fas fa-floppy-disk"></i> Save Changes';
    document.getElementById('cancelDepartmentEdit').hidden = false;
    document.getElementById('departmentName').focus();
    return;
  }
  var button = event.target.closest('[data-delete-department]'); if (!button) return;
  var index = Number(button.dataset.deleteDepartment), department = departments[index];
  var linked = programmes.some(function(programme) { return sameName(programmeDepartment(programme), department.name); });
  if (linked) { Portal.toast('Remove or move linked programmes before deleting this department.', true); return; }
  if (!confirm('Delete '+department.name+'?')) return;
  try {
    if (department.id && window.AxiomDB && AxiomDB.isConfigured() && AxiomDB.deleteDepartment) await AxiomDB.deleteDepartment(department.id);
    departments.splice(index, 1); saveDepartments(); renderDepartments(); Portal.toast('Department deleted.');
  } catch (err) { console.error(err); Portal.toast('Could not delete department because it is still in use.', true); }
});

document.getElementById('refreshDepartments').addEventListener('click', refreshDepartments);
renderDepartments();
refreshDepartments();
</script>

</body>
</html>
